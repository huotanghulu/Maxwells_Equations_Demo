<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麦克斯韦方程组</title>
    
    <!-- 引入 Google Fonts 高级无衬线字体 Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- 引入 KaTeX 用于渲染极简优美的数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        /* 极简暗黑风格及全局参数配置 */
        :root {
            --bg: #050507;
            --e-color: #00e5ff; /* 电场颜色：青色 */
            --b-color: #ffea00; /* 磁场颜色：黄色 */
            --text-main: #f0f0f0;
            --text-muted: #666;

            /* =================================================== */
            /* 【参数配置：信息面板尺寸】                           */
            /* =================================================== */
            --info-width: 80%;             /* 面板屏幕占比 (原为 90%) */
            --info-max-width: 500px;       /* 面板最大宽度 (原为 800px) */
            --info-eq-height: 65px;        /* 公式区域高度 (原为 90px) */
            --info-desc-min-height: 50px;  /* 描述文本最小高度 (原为 80px) */
            --info-desc-padding: 8px 16px; /* 描述文本内边距 (原为 15px 30px) */
            /* =================================================== */
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            /* 统一采用极简优雅的无衬线字体族 */
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #field-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* 顶部信息层 */
        .info-panel {
            position: absolute;
            top: 6%; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: var(--info-width);
            max-width: var(--info-max-width);
        }
        .title {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 5px;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            text-transform: uppercase;
        }
        
        /* 锁定公式区域的高度，防止下方文字跳动 */
        #equation-display {
            font-size: 2.2rem;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            height: var(--info-eq-height);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        
        #desc-display {
            font-size: 0.95rem;
            font-weight: 300;
            color: #b0b0b5;
            line-height: 1.7;
            letter-spacing: 0.5px;
            min-height: var(--info-desc-min-height);
            background: transparent; 
            padding: var(--info-desc-padding);
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: none;    
        }

        /* 底部控制面板 */
        .controls {
            position: absolute;
            bottom: 6%; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 10px 15px;
        }
        .btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
        }
        .btn:hover { 
            color: var(--text-main); 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }
        /* 点击后转换为无胶囊的文字高光发光效果 */
        .btn.active {
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 25px rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }
        
        .hint {
            position: absolute;
            bottom: 2%; left: 50%;
            transform: translateX(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 300;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="field-canvas"></canvas>

    <div class="info-panel">
        <div class="title" id="mode-title"></div>
        <div id="equation-display"></div>
        <div id="desc-display"></div>
    </div>

    <div class="controls">
        <button class="btn active" data-mode="gauss_e">I. 高斯电场</button>
        <button class="btn" data-mode="gauss_b">II. 高斯磁场</button>
        <button class="btn" data-mode="faraday">III. 法拉第</button>
        <button class="btn" data-mode="ampere">IV. 安培-麦克斯韦</button>
        <button class="btn" data-mode="wave">V. 光</button>
    </div>
<script>
    // =================================================== 
    // 【参数配置：JS 逻辑行为】                           
    // =================================================== 
    const CONFIG = {
        enableInactiveZone: true, // 是否启用非激活区限制
        inactiveMargin: -5,        // 基础缓冲区厚度（负值意味着允许更靠近文本中心再开始衰减）
        featherWidth: 60,         // 边缘渐变过渡宽度（像素），数值越大边缘过渡越柔和
        sourceLerpFactor: 0.12,   // 场源追踪光标的插值常数。值越小，延迟与滑行感越明显（推荐 0.08 ~ 0.15）
        glowRadius: 240,          // 箭头启动辉光效果的最大距离半径（像素）
    };
    // =================================================== 

    const equations = {
        gauss_e: {
            title: "高斯电场定律",
            tex: "\\nabla \\cdot \\mathbf{E} = \\frac{\\rho}{\\varepsilon_0}",
            desc: "这是一个<b>电荷</b>。它向周围空间辐射出电场线。"
        },
        gauss_b: {
            title: "高斯磁场定律",
            tex: "\\nabla \\cdot \\mathbf{B} = 0",
            desc: "这是一块<b>磁铁</b>。磁感线永远闭合，无源无尾。"
        },
        faraday: {
            title: "法拉第电磁感应定律",
            tex: "\\nabla \\times \\mathbf{E} = -\\frac{\\partial \\mathbf{B}}{\\partial t}",
            desc: "当磁场随时间发生变化，就会凭空激发出电场。"
        },
        ampere: {
            title: "安培-麦克斯韦定律",
            tex: "\\nabla \\times \\mathbf{B} = \\mu_0 \\mathbf{J} + \\mu_0 \\varepsilon_0 \\frac{\\partial \\mathbf{E}}{\\partial t}",
            desc: "变化的电场同样能激发出磁场，电与磁在此彻底对称。"
        },
        wave: {
            title: "终极统一：电磁波 - 光",
            tex: "\\nabla^2 \\mathbf{E} = \\mu_0 \\varepsilon_0 \\frac{\\partial^2 \\mathbf{E}}{\\partial t^2}",
            desc: "交变的电场 and 磁场相互嵌套，脱离源头向宇宙深处传播，<br>其速度恰好等于光速。<br>光，就是电磁波。"
        }
    };

    let currentMode = 'gauss_e';
    const eqDisplay = document.getElementById('equation-display');
    const descDisplay = document.getElementById('desc-display');
    const titleDisplay = document.getElementById('mode-title');

    // 缓存顶部面板与底部面板区域的边界，以便在交互与渲染时避开
    let infoRect = { left: 0, right: 0, top: 0, bottom: 0 };
    let controlsRect = { left: 0, right: 0, top: 0, bottom: 0 };

    function updateInfoRect() {
        if (!CONFIG.enableInactiveZone) {
            infoRect = { left: -9999, right: -9999, top: -9999, bottom: -9999 };
            controlsRect = { left: -9999, right: -9999, top: -9999, bottom: -9999 };
            return;
        }
        // 更新顶部区域边界
        const infoEl = document.querySelector('.info-panel');
        if (infoEl) {
            const rect = infoEl.getBoundingClientRect();
            const margin = CONFIG.inactiveMargin; 
            infoRect = {
                left: rect.left - margin,
                right: rect.right + margin,
                top: rect.top - margin,
                bottom: rect.bottom + margin
            };
        }
        // 更新底部控制区域边界
        const controlsEl = document.querySelector('.controls');
        if (controlsEl) {
            const rect = controlsEl.getBoundingClientRect();
            const margin = CONFIG.inactiveMargin;
            controlsRect = {
                left: rect.left - margin,
                right: rect.right + margin,
                top: rect.top - margin,
                bottom: rect.bottom + margin
            };
        }
    }

    // 计算单个矩形区域对坐标点的激活程度
    function getRectFactor(x, y, rect) {
        const dl = x - rect.left;
        const dr = rect.right - x;
        const dt = y - rect.top;
        const db = rect.bottom - y;

        const isInside = (dl > 0 && dr > 0 && dt > 0 && db > 0);

        let signedDist;
        if (isInside) {
            signedDist = -Math.min(dl, dr, dt, db);
        } else {
            const dx = Math.max(-dl, -dr, 0);
            const dy = Math.max(-dt, -db, 0);
            signedDist = Math.sqrt(dx*dx + dy*dy);
        }

        const feather = CONFIG.featherWidth;
        if (signedDist <= -feather) return 0.0;
        if (signedDist >= feather) return 1.0;

        const t = (signedDist + feather) / (2 * feather);
        return t * t * (3 - 2 * t);
    }

    // 综合顶部和底部非激活区因子
    function getActivationFactor(x, y) {
        if (!CONFIG.enableInactiveZone) return 1.0;
        const factorInfo = getRectFactor(x, y, infoRect);
        const factorControls = getRectFactor(x, y, controlsRect);
        return Math.min(factorInfo, factorControls);
    }

    function updateUI(mode) {
        currentMode = mode;
        const data = equations[mode];
        titleDisplay.innerText = data.title;
        descDisplay.innerHTML = data.desc;
        katex.render(data.tex, eqDisplay, { displayMode: true, throwOnError: false });
        setTimeout(updateInfoRect, 50);
    }

    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            updateUI(e.target.dataset.mode);
        });
    });

    // Canvas 引擎
    const canvas = document.getElementById('field-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    const GRID_SIZE = 40; 
    let globalTime = 0; 
    
    let gridData = [];

    // 保存物理输入目标的鼠标坐标（原始输入位置）
    let mouse = { x: window.innerWidth/2, y: window.innerHeight/2, isPressed: false };
    
    // 具有平滑物理追随与惯性机制的场源（添加 vx, vy 表示场源移动速度）
    let activeSource = { 
        x: window.innerWidth/2, 
        y: window.innerHeight/2, 
        vx: 0, 
        vy: 0 
    };

    function initGrid() {
        gridData = [];
        for (let x = 0; x < width; x += GRID_SIZE) {
            for (let y = 0; y < height; y += GRID_SIZE) {
                gridData.push({ x, y, ex: 0, ey: 0, bx: 0, by: 0 });
            }
        }
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        mouse.x = width / 2; mouse.y = height / 2;
        activeSource.x = width / 2; activeSource.y = height / 2;
        activeSource.vx = 0; activeSource.vy = 0;
        initGrid();
        setTimeout(updateInfoRect, 50);
    }
    window.addEventListener('resize', resize);
    
    updateUI('gauss_e');
    resize();

    function handleMove(x, y) {
        mouse.x = x; 
        mouse.y = y;
    }
    window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('mousedown', () => mouse.isPressed = true);
    window.addEventListener('mouseup', () => mouse.isPressed = false);
    window.addEventListener('touchstart', () => mouse.isPressed = true);
    window.addEventListener('touchend', () => mouse.isPressed = false);

    // 绘制矢量，新增 glowIntensity 参数（0.0 ~ 1.0），控制箭头的辉光强度
    function drawVector(x, y, vx, vy, color, glowIntensity = 0) {
        const mag = Math.sqrt(vx*vx + vy*vy);
        if (mag < 0.5) return; 
        
        const maxLen = GRID_SIZE * 0.85;
        const scale = Math.min(mag, maxLen) / mag;
        const dx = vx * scale;
        const dy = vy * scale;

        const alpha = Math.min(mag / 15, 1); 
        const angle = Math.atan2(dy, dx);
        const headLen = 5;

        // 统一描述矢量的路径轨迹结构，减少重复代码并提升稳定性
        function tracePath() {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + dx, y + dy);
            ctx.moveTo(x + dx, y + dy);
            ctx.lineTo(x + dx - headLen * Math.cos(angle - Math.PI/6), y + dy - headLen * Math.sin(angle - Math.PI/6));
            ctx.moveTo(x + dx, y + dy);
            ctx.lineTo(x + dx - headLen * Math.cos(angle + Math.PI/6), y + dy - headLen * Math.sin(angle + Math.PI/6));
        }

        // 1. 底层微光/辉光层（仅当靠近场源时触发）
        if (glowIntensity > 0.02) {
            ctx.save();
            tracePath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4.2;                            // 采用略粗的笔触以形成漫反射感
            ctx.globalAlpha = alpha * glowIntensity * 0.45; // 受强度因子与距离的双重过滤
            ctx.shadowBlur = glowIntensity * 12;            // 动态发光半径
            ctx.shadowColor = color;
            ctx.stroke();
            ctx.restore();
        }

        // 2. 顶层清晰核心层
        tracePath();
        ctx.strokeStyle = `${color}${Math.floor(alpha*255).toString(16).padStart(2,'0')}`;
        ctx.lineWidth = 2.2;
        ctx.stroke();
    }

    function animate() {
        ctx.fillStyle = 'rgba(5, 5, 7, 0.4)';
        ctx.fillRect(0, 0, width, height);

        globalTime += 0.15; 

        // 计算带延迟阻尼的平滑追随物理源
        const prevSourceX = activeSource.x;
        const prevSourceY = activeSource.y;
        
        // 缓动算法 (Lerp) 实现带阻尼感的追踪
        activeSource.x += (mouse.x - activeSource.x) * CONFIG.sourceLerpFactor;
        activeSource.y += (mouse.y - activeSource.y) * CONFIG.sourceLerpFactor;
        
        // 通过场源的实际位移来计算平滑后的速度，使相互作用的电磁感应也自带平滑过滤
        activeSource.vx = activeSource.x - prevSourceX;
        activeSource.vy = activeSource.y - prevSourceY;

        let sourceX = activeSource.x;
        let sourceY = activeSource.y;
        let polarity = mouse.isPressed ? -1 : 1; 

        const sourceFactor = getActivationFactor(sourceX, sourceY);
        const LERP_FACTOR = (currentMode === 'wave') ? 1.0 : 0.15;

        for (let i = 0; i < gridData.length; i++) {
            let cell = gridData[i];
            const cellFactor = getActivationFactor(cell.x, cell.y);
            const intensityFactor = sourceFactor * cellFactor;

            const dx = cell.x - sourceX;
            const dy = cell.y - sourceY;
            const distSq = dx*dx + dy*dy;
            const dist = Math.sqrt(distSq) + 1; 

            let targetEx = 0, targetEy = 0; 
            let targetBx = 0, targetBy = 0; 

            if (intensityFactor > 0.001) {
                if (currentMode === 'gauss_e') {
                    const force = (60000 / (distSq + 600)) * polarity; 
                    targetEx = (dx / dist) * force * intensityFactor;
                    targetEy = (dy / dist) * force * intensityFactor;
                } 
                else if (currentMode === 'gauss_b') {
                    const m = 300000 * polarity; 
                    const dot = dy; 
                    targetBx = (3 * dx * dot) / Math.pow(distSq + 2000, 2.1) * m * intensityFactor;
                    targetBy = (3 * dy * dot - distSq) / Math.pow(distSq + 2000, 2.1) * m * intensityFactor;
                }
                else if (currentMode === 'faraday') {
                    const speed = Math.sqrt(activeSource.vx * activeSource.vx + activeSource.vy * activeSource.vy);
                    if (speed > 0.8) { // 恢复合理的阈值，过滤掉微小位移
                        const curlForce = 250 * speed / (distSq * 0.01 + 150); // 恢复原有的空间衰减系数
                        targetEx = -dy / dist * curlForce * intensityFactor;
                        targetEy = dx / dist * curlForce * intensityFactor;
                        targetBx = (activeSource.vx * 35 / dist) * intensityFactor; // 恢复原有范围
                        targetBy = (activeSource.vy * 35 / dist) * intensityFactor;
                    }
                }
                else if (currentMode === 'ampere') {
                    const speed = Math.sqrt(activeSource.vx * activeSource.vx + activeSource.vy * activeSource.vy);
                    if (speed > 0.8) { // 恢复合理的阈值，过滤掉微小位移
                        const curlForce = 250 * speed / (distSq * 0.01 + 150); // 恢复原有的空间衰减系数
                        targetBx = -dy / dist * curlForce * intensityFactor;
                        targetBy = dx / dist * curlForce * intensityFactor;
                        targetEx = (activeSource.vx * 35 / dist) * intensityFactor; // 恢复原有范围
                        targetEy = (activeSource.vy * 35 / dist) * intensityFactor;
                    }
                }
                else if (currentMode === 'wave') {
                    const k = 0.04;  
                    const w = 1.0;   
                    const phase = k * dist - w * globalTime;
                    const amplitude = 1200 / (dist + 50); 
                    const osc = Math.sin(phase) * amplitude;

                    targetEx = (-dy / dist) * osc * intensityFactor;
                    targetEy = (dx / dist) * osc * intensityFactor;
                    targetBx = (dx / dist) * osc * intensityFactor;
                    targetBy = (dy / dist) * osc * intensityFactor;
                }
            }

            cell.ex += (targetEx - cell.ex) * LERP_FACTOR;
            cell.ey += (targetEy - cell.ey) * LERP_FACTOR;
            cell.bx += (targetBx - cell.bx) * LERP_FACTOR;
            cell.by += (targetBy - cell.by) * LERP_FACTOR;

            // 基于距离场源的远近，计算箭头的发光衰减率。越接近球中心，辉光越强。
            const maxGlowRadius = CONFIG.glowRadius;
            const baseGlow = dist < maxGlowRadius ? Math.pow((maxGlowRadius - dist) / maxGlowRadius, 1.8) : 0;
            const finalGlow = baseGlow * intensityFactor; // 融合遮罩区域因子，避免遮蔽区处异常高亮

            if (Math.abs(cell.ex) > 0 || Math.abs(cell.ey) > 0) drawVector(cell.x, cell.y, cell.ex, cell.ey, '#00e5ff', finalGlow);
            if (Math.abs(cell.bx) > 0 || Math.abs(cell.by) > 0) drawVector(cell.x, cell.y, cell.bx, cell.by, '#ffea00', finalGlow);
        }

        ctx.beginPath();
        ctx.arc(sourceX, sourceY, 8, 0, Math.PI * 2);
        
        if (currentMode === 'gauss_e') {
            ctx.fillStyle = mouse.isPressed ? '#ff0055' : '#00e5ff';
        } else if (currentMode === 'gauss_b') {
            ctx.fillStyle = mouse.isPressed ? '#ff5500' : '#ffea00';
        } else if (currentMode === 'faraday') {
            ctx.fillStyle = '#ffea00';
        } else if (currentMode === 'ampere') {
            ctx.fillStyle = '#00e5ff';
        } else if (currentMode === 'wave') {
            ctx.fillStyle = Math.sin(-globalTime) > 0 ? '#00e5ff' : '#ffea00';
        }

        ctx.globalAlpha = 0.35 + 0.65 * sourceFactor;      
        ctx.shadowBlur = 6 + 19 * sourceFactor;            
        ctx.shadowColor = ctx.fillStyle;
        
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;

        requestAnimationFrame(animate);
    }

    animate();

</script>
</body>
</html>
